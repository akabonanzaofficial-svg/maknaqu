<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaknaQu - Kauniyah & Harfiyah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    
    <style>
        .font-arabic { font-family: 'Amiri', serif; }
        .dir-rtl { direction: rtl; text-align: right; }
        
        /* Animasi Loading */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #eab308;
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800">

    <header class="bg-neutral-900 text-white p-6 shadow-md rounded-b-3xl mb-6 max-w-4xl mx-auto">
        <div class="max-w-3xl mx-auto text-center">
            <h1 class="text-3xl font-bold mb-2 flex items-center justify-center gap-2 text-yellow-400">
                <i data-lucide="book-open" class="w-8 h-8"></i>
                MaknaQu
            </h1>
            <p class="text-neutral-300 opacity-90">Eksplorasi Kauniyah & Pencari Ayat Harfiyah</p>
        </div>
        
        <div class="mt-8 max-w-2xl mx-auto relative">
            <div class="relative flex items-center w-full h-14 rounded-full focus-within:shadow-lg bg-white overflow-hidden shadow-md">
                <div class="grid place-items-center h-full w-12 text-gray-300" id="searchIconContainer">
                    <i data-lucide="search" class="w-6 h-6 text-yellow-500"></i>
                </div>
                <input
                    class="peer h-full w-full outline-none text-sm text-gray-700 pr-4 bg-transparent"
                    type="text"
                    id="searchInput"
                    placeholder="Cari kata kauniyah atau makna dalam Harfiyah..."
                />
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-12">
        <div class="flex justify-center gap-2 mb-8 bg-white p-1 rounded-full shadow-sm max-w-fit mx-auto border border-slate-200">
            <button data-tab="all" class="tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all bg-neutral-900 text-yellow-400 shadow-sm">
                Semua
            </button>
            <button data-tab="kauniyah" class="tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all text-slate-600 hover:bg-slate-100 flex items-center gap-2">
                <i data-lucide="sun" class="w-4 h-4"></i> Kauniyah
            </button>
            <button data-tab="quran" class="tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all text-slate-600 hover:bg-slate-100 flex items-center gap-2">
                <i data-lucide="book-open" class="w-4 h-4"></i> Harfiyah
            </button>
        </div>

        <div id="mainContent" class="space-y-6">
            <!-- Konten di-render oleh JS -->
        </div>
    </main>

    <script>
        // ==========================================
        // 1. PENGATURAN DATABASE (GOOGLE SHEETS)
        // ==========================================
        // CARA PENGGUNAAN: 
        // 1. Buat Google Sheet dengan kolom persis urutannya: Kata, Makna Positif, Makna Negatif, Keterangan
        // 2. Klik File -> Share -> Publish to web -> Ubah Web Page jadi CSV -> Publish
        // 3. Paste link CSV tersebut di bawah ini:
        const GOOGLE_SHEETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQnp6kkrTJnRs9gzJoEIrICv5p77-slw75C6ilwrDynFIOZmOgBGKUrKqfoaQF7n6tmiBwY8vzCczdb/pub?output=csv'; 

        // Data cadangan jika Google Sheets gagal dimuat atau URL masih kosong
        let localKauniyahData = [
            { word: 'Api', maknaPositif: 'Sumber kehangatan dan cahaya yang menerangi kegelapan.', maknaNegatif: 'Sifat perusak yang menghanguskan jika tidak terkendali.', keterangan: 'Sering digunakan sebagai perumpamaan amarah dalam hati manusia.' },
            { word: 'Angin', maknaPositif: 'Membawa awan hujan dan menyejukkan bumi.', maknaNegatif: '', keterangan: 'Angin yang tenang membawa rahmat.' }
        ];

        // ==========================================
        // 2. STATE & VARIABEL GLOBAL
        // ==========================================
        let state = {
            query: '',
            activeTab: 'all',
            isLoading: false,
            results: { kauniyah: [], quran: [] },
            fullKauniyahDatabase: [] // Akan diisi saat halaman dimuat
        };

        const searchInput = document.getElementById('searchInput');
        const tabButtons = document.querySelectorAll('.tab-btn');
        const mainContent = document.getElementById('mainContent');
        const searchIconContainer = document.getElementById('searchIconContainer');

        let searchTimeout = null;

        // ==========================================
        // 3. FUNGSI FETCH API (AL-QURAN & GOOGLE SHEETS)
        // ==========================================

        // Parse CSV Sederhana dan Kuat dari Google Sheets (Mendukung sel kosong)
        function parseCSV(csvText) {
            const rows = csvText.split(/\r?\n/);
            const data = [];
            // Lewati baris pertama (header)
            for(let i = 1; i < rows.length; i++) {
                if(!rows[i].trim()) continue;
                
                const cols = [];
                let curr = '';
                let inQuotes = false;
                
                for(let char of rows[i]) {
                    if(char === '"') inQuotes = !inQuotes;
                    else if(char === ',' && !inQuotes) {
                        cols.push(curr);
                        curr = '';
                    } else {
                        curr += char;
                    }
                }
                cols.push(curr); // Masukkan kolom terakhir
                
                if(cols.length >= 1 && (cols[0] || '').trim() !== '') { // Minimal ada Kata
                    data.push({
                        id: 'd' + i,
                        word: (cols[0] || '').replace(/(^"|"$)/g, '').trim(),
                        maknaPositif: (cols[1] || '').replace(/(^"|"$)/g, '').trim(),
                        maknaNegatif: (cols[2] || '').replace(/(^"|"$)/g, '').trim(),
                        keterangan: (cols[3] || '').replace(/(^"|"$)/g, '').trim()
                    });
                }
            }
            return data;
        }

        // Memuat database Kauniyah dari Google Sheets (Hanya dipanggil sekali saat load)
        async function initKauniyahDatabase() {
            if (!GOOGLE_SHEETS_CSV_URL) {
                state.fullKauniyahDatabase = localKauniyahData;
                return;
            }
            try {
                // Menambahkan timestamp agar browser tidak membaca cache lama
                const cacheBuster = '&t=' + new Date().getTime();
                const res = await fetch(GOOGLE_SHEETS_CSV_URL + cacheBuster);
                const text = await res.text();
                state.fullKauniyahDatabase = parseCSV(text);
            } catch (err) {
                console.error("Gagal load Google Sheets, memakai data lokal.", err);
                state.fullKauniyahDatabase = localKauniyahData;
            }
        }

        // Pencarian API Al-Quran (api.quran.com)
        async function fetchQuranSearch(query) {
            try {
                // 1. Cari terjemahan yang mengandung query (Maks 3 hasil agar ringan)
                const searchUrl = `https://api.quran.com/api/v4/search?q=${query}&size=3&language=id`;
                const searchRes = await fetch(searchUrl);
                const searchData = await searchRes.json();
                const verses = searchData.search.results;

                if (!verses || verses.length === 0) return [];

                // 2. Ambil teks arab dari hasil pencarian di atas
                const quranResults = [];
                for (const verse of verses) {
                    const verseKey = verse.verse_key; // Format: "Surah:Ayat", misal "2:153"
                    const [surahNum, ayatNum] = verseKey.split(':');
                    
                    const textUrl = `https://api.quran.com/api/v4/verses/by_key/${verseKey}?translations=33&fields=text_uthmani`;
                    const textRes = await fetch(textUrl);
                    const textData = await textRes.json();

                    quranResults.push({
                        id: verseKey,
                        surah: `Surah Ke-${surahNum}`,
                        ayat: ayatNum,
                        arabic: textData.verse.text_uthmani,
                        // Menghilangkan tag HTML (seperti <strong>) dari API
                        translation: textData.verse.translations[0].text.replace(/<[^>]*>?/gm, '') 
                    });
                }
                return quranResults;
            } catch (err) {
                console.error("Gagal mencari ayat:", err);
                return [];
            }
        }

        // ==========================================
        // 4. LOGIKA PENCARIAN & RENDER
        // ==========================================

        async function executeSearch() {
            const query = state.query.toLowerCase().trim();
            
            if (!query) {
                state.results = { kauniyah: [], quran: [] };
                setLoading(false);
                render();
                return;
            }

            setLoading(true);

            // Filter Kauniyah secara lokal (karena datanya sudah di-download saat load)
            const filteredKauniyah = state.fullKauniyahDatabase.filter(item => 
                item.word.toLowerCase().includes(query) || 
                item.maknaPositif.toLowerCase().includes(query) ||
                item.maknaNegatif.toLowerCase().includes(query) ||
                item.keterangan.toLowerCase().includes(query)
            );

            // Fetch Quran via Internet
            const filteredQuran = await fetchQuranSearch(query);

            state.results = {
                kauniyah: filteredKauniyah,
                quran: filteredQuran
            };

            setLoading(false);
            render();
        }

        // Event Listener: Ketik dengan Delay (Debounce) agar tidak spam server API
        searchInput.addEventListener('input', (e) => {
            state.query = e.target.value;
            
            // Bersihkan timer sebelumnya
            if (searchTimeout) clearTimeout(searchTimeout);
            
            // Render loading UI langsung saat ngetik
            if(state.query.trim()) setLoading(true);

            // Tunggu 800ms setelah selesai mengetik, baru eksekusi pencarian
            searchTimeout = setTimeout(() => {
                executeSearch();
            }, 800); 
        });

        tabButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                state.activeTab = e.currentTarget.getAttribute('data-tab');
                updateTabUI();
                render();
            });
        });

        window.setSearchQuery = function(term) {
            searchInput.value = term;
            state.query = term;
            executeSearch();
        }

        function setLoading(isLoading) {
            state.isLoading = isLoading;
            if (isLoading) {
                searchIconContainer.innerHTML = `<div class="loader"></div>`;
                mainContent.innerHTML = `
                    <div class="text-center py-12 text-slate-400">
                        <div class="loader mx-auto mb-4"></div>
                        <p>Mencari di dalam server & Harfiyah...</p>
                    </div>`;
            } else {
                searchIconContainer.innerHTML = `<i data-lucide="search" class="w-6 h-6 text-yellow-500"></i>`;
                lucide.createIcons();
            }
        }

        function updateTabUI() {
            tabButtons.forEach(btn => {
                const tab = btn.getAttribute('data-tab');
                if (tab === state.activeTab) {
                    btn.className = "tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all bg-neutral-900 text-yellow-400 shadow-sm flex items-center gap-2";
                } else {
                    btn.className = "tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all text-slate-600 hover:bg-slate-100 flex items-center gap-2";
                }
            });
        }

        function render() {
            if (state.isLoading) return; // Dicegah agar skeleton loader tidak tertimpa

            let htmlString = '';
            const totalResults = state.results.kauniyah.length + state.results.quran.length;
            const query = state.query.trim();

            if (!query) {
                htmlString = `
                    <div class="text-center py-12 text-slate-500">
                        <p class="text-lg">Ketik sesuatu di kotak pencarian untuk memulai.</p>
                        <div class="mt-6 flex flex-wrap justify-center gap-2">
                            <span class="text-sm text-slate-400 w-full mb-2">Pencarian Populer:</span>
                            ${['Langit', 'Bumi', 'Sabar', 'Matahari'].map(term => `
                                <button onclick="setSearchQuery('${term}')" class="px-4 py-1.5 bg-white border border-yellow-200 text-yellow-700 rounded-full text-sm hover:bg-yellow-50 transition-colors shadow-sm">
                                    ${term}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (totalResults === 0) {
                htmlString = `
                    <div class="text-center py-12 text-slate-500 bg-white rounded-2xl shadow-sm border border-slate-100">
                        <i data-lucide="search" class="w-12 h-12 mx-auto text-slate-300 mb-4"></i>
                        <p class="text-lg font-medium">Tidak ada hasil ditemukan.</p>
                        <p class="text-sm mt-1">Coba gunakan kata kunci lain.</p>
                    </div>
                `;
            } else {
                
                // --- RENDER KAUNIYAH ---
                if ((state.activeTab === 'all' || state.activeTab === 'kauniyah') && state.results.kauniyah.length > 0) {
                    htmlString += `
                        <div class="mb-8">
                            <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2 mb-4">
                                <i data-lucide="sun" class="text-yellow-500 w-5 h-5"></i>
                                Hasil Kauniyah
                                <span class="bg-yellow-100 text-yellow-700 text-xs px-2 py-0.5 rounded-full">${state.results.kauniyah.length}</span>
                            </h2>
                            <div class="grid gap-4 md:grid-cols-2">
                                ${state.results.kauniyah.map(item => `
                                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                        <h3 class="text-xl font-bold text-neutral-900 mb-4 pb-2 border-b border-slate-100">${item.word}</h3>
                                        
                                        <div class="space-y-3">
                                            ${item.maknaPositif ? `
                                            <div class="bg-emerald-50 p-3 rounded-xl border border-emerald-100/50">
                                                <p class="text-xs font-bold text-emerald-800 mb-1 flex items-center gap-1 uppercase tracking-wider">
                                                    <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> Makna Positif
                                                </p>
                                                <p class="text-sm text-slate-700">${item.maknaPositif}</p>
                                            </div>` : ''}

                                            ${item.maknaNegatif ? `
                                            <div class="bg-rose-50 p-3 rounded-xl border border-rose-100/50">
                                                <p class="text-xs font-bold text-rose-800 mb-1 flex items-center gap-1 uppercase tracking-wider">
                                                    <i data-lucide="minus-circle" class="w-3.5 h-3.5"></i> Makna Negatif
                                                </p>
                                                <p class="text-sm text-slate-700">${item.maknaNegatif}</p>
                                            </div>` : ''}

                                            ${item.keterangan ? `
                                            <div class="mt-3 px-1">
                                                <p class="text-sm text-slate-600 italic flex gap-2 items-start">
                                                    <i data-lucide="info" class="w-4 h-4 text-blue-500 mt-0.5 flex-shrink-0"></i>
                                                    <span>${item.keterangan}</span>
                                                </p>
                                            </div>` : ''}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                // --- RENDER QURAN ---
                if ((state.activeTab === 'all' || state.activeTab === 'quran') && state.results.quran.length > 0) {
                    htmlString += `
                        <div>
                            <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2 mb-4">
                                <i data-lucide="book-open" class="text-yellow-500 w-5 h-5"></i>
                                Hasil Harfiyah
                                <span class="bg-yellow-100 text-yellow-700 text-xs px-2 py-0.5 rounded-full">${state.results.quran.length}</span>
                            </h2>
                            <div class="space-y-4">
                                ${state.results.quran.map(item => `
                                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                        <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                                            <div class="flex items-center gap-2">
                                                <i data-lucide="bookmark" class="w-5 h-5 text-yellow-500"></i>
                                                <h3 class="font-bold text-slate-800 text-lg">${item.surah} : Ayat ${item.ayat}</h3>
                                            </div>
                                        </div>
                                        <div class="mb-6">
                                            <p class="text-2xl font-arabic text-slate-900 leading-[2.5] dir-rtl text-right">
                                                ${item.arabic}
                                            </p>
                                        </div>
                                        <div class="space-y-3">
                                            <p class="text-slate-700 leading-relaxed text-sm bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <span class="font-bold text-slate-800">Terjemah:</span><br>
                                                ${item.translation}
                                            </p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            mainContent.innerHTML = htmlString;
            lucide.createIcons();
        }

        // Init App
        lucide.createIcons();
        render();
        // Load database Kauniyah dari Google Sheets saat pertama dibuka
        initKauniyahDatabase();

    </script>
</body>
</html>
