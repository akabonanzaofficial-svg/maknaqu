<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaknaQu - Kauniyah & Harfiyah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    
    <style>
        .font-arabic { font-family: 'Amiri', serif; }
        .dir-rtl { direction: rtl; text-align: right; }
        
        /* Animasi Loading */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #eab308;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Modal Blur */
        #adminModal.flex { backdrop-blur: 4px; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800">

    <!-- LOGIN PENGUNJUNG OVERLAY -->
    <div id="loginOverlay" class="fixed inset-0 bg-slate-50 flex items-center justify-center p-4" style="z-index: 9999;">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl text-center">
            <div class="w-16 h-16 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="lock" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-slate-800">Akses MaknaQu</h2>
            <p class="text-sm text-slate-500 mb-6">Masukkan kata sandi untuk mengakses aplikasi.</p>
            <form id="userLoginForm" class="space-y-4">
                <input type="password" id="userPass" placeholder="Kata Sandi Akses" class="w-full p-4 rounded-xl border border-slate-200 focus:border-yellow-400 outline-none bg-slate-50 text-center" required>
                <button type="submit" id="userLoginBtn" class="w-full bg-yellow-500 text-white py-4 rounded-xl font-bold hover:bg-yellow-600 transition-all shadow-lg shadow-yellow-500/30 flex items-center justify-center gap-2">
                    <i data-lucide="unlock" class="w-5 h-5"></i> Masuk
                </button>
            </form>
        </div>
    </div>

    <!-- WRAPPER UTAMA APLIKASI (Disembunyikan saat awal) -->
    <div id="appContainer" class="hidden">
        <header class="bg-neutral-900 text-white p-6 shadow-md rounded-b-3xl mb-6 max-w-4xl mx-auto relative">
            <div class="max-w-3xl mx-auto text-center">
                <h1 class="text-3xl font-bold mb-2 flex items-center justify-center gap-2 text-yellow-400">
                    <i data-lucide="book-open" class="w-8 h-8"></i> MaknaQu
                </h1>
                <p class="text-neutral-300 opacity-90 text-sm">Eksplorasi Kauniyah & Pencari Ayat Harfiyah</p>
            </div>
            
            <!-- Tombol Tambah Data -->
            <button onclick="openAdminModal('add')" class="absolute top-4 right-4 text-[10px] bg-white/10 hover:bg-white/20 text-white/70 px-3 py-1 rounded-full flex items-center gap-1 transition-all border border-white/10">
                <i data-lucide="plus" class="w-3 h-3"></i> Tambah
            </button>

            <div class="mt-8 max-w-2xl mx-auto relative">
                <div class="relative flex items-center w-full h-14 rounded-full focus-within:shadow-lg bg-white overflow-hidden shadow-md">
                    <div class="grid place-items-center h-full w-12 text-gray-300" id="searchIconContainer">
                        <i data-lucide="search" class="w-6 h-6 text-yellow-500"></i>
                    </div>
                    <input class="peer h-full w-full outline-none text-sm text-gray-700 pr-4 bg-transparent" type="text" id="searchInput" placeholder="Cari kata kauniyah atau makna..." />
                </div>
            </div>
        </header>

        <main class="max-w-4xl mx-auto px-4 pb-12">
            <div class="flex justify-center gap-2 mb-8 bg-white p-1 rounded-full shadow-sm max-w-fit mx-auto border border-slate-200">
                <button data-tab="all" class="tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all bg-neutral-900 text-yellow-400 shadow-sm flex items-center gap-2">Semua</button>
                <button data-tab="kauniyah" class="tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all text-slate-600 hover:bg-slate-100 flex items-center gap-2"><i data-lucide="sun" class="w-4 h-4"></i> Kauniyah</button>
                <button data-tab="quran" class="tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all text-slate-600 hover:bg-slate-100 flex items-center gap-2"><i data-lucide="book-open" class="w-4 h-4"></i> Harfiyah</button>
            </div>

            <div id="mainContent" class="space-y-6"></div>
        </main>
    </div> <!-- END WRAPPER UTAMA APLIKASI -->

    <!-- ADMIN MODAL -->
    <div id="adminModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl scale-95 transition-transform max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-xl font-bold flex items-center gap-2 text-slate-800">
                    <i data-lucide="database" class="text-yellow-500"></i> Kelola Data
                </h2>
                <button onclick="closeAdminModal()" class="text-slate-400 hover:text-slate-600 bg-slate-100 p-1 rounded-full">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <form id="cmsForm" class="space-y-4">
                <!-- Hidden Input untuk menyimpan ID saat mode Edit -->
                <input type="hidden" id="editId" value="">
                <input type="hidden" id="formAction" value="add">

                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-500 ml-1">Autentikasi (Sistem Keamanan)</label>
                    <input type="password" id="adminPass" placeholder="Masukkan Password Admin" class="w-full p-3 rounded-xl border border-slate-200 focus:border-yellow-400 outline-none bg-rose-50" required>
                </div>
                <hr class="border-slate-100">
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-500 ml-1">Data Kata</label>
                    <input type="text" id="newWord" placeholder="Kata (Contoh: Bintang)" class="w-full p-3 rounded-xl border border-slate-200 focus:border-yellow-400 outline-none" required>
                </div>
                <textarea id="newPositif" placeholder="Makna Positif" class="w-full p-3 rounded-xl border border-slate-200 focus:border-yellow-400 outline-none h-20"></textarea>
                <textarea id="newNegatif" placeholder="Makna Negatif" class="w-full p-3 rounded-xl border border-slate-200 focus:border-yellow-400 outline-none h-20"></textarea>
                <input type="text" id="newKet" placeholder="Keterangan Tambahan" class="w-full p-3 rounded-xl border border-slate-200 focus:border-yellow-400 outline-none">
                
                <button type="submit" id="submitBtn" class="w-full bg-neutral-900 text-yellow-400 py-4 rounded-2xl font-bold hover:bg-neutral-800 transition-all flex items-center justify-center gap-2 mt-4 shadow-lg shadow-yellow-400/10">
                    <i data-lucide="send" class="w-4 h-4"></i> Simpan Data
                </button>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. PENGATURAN DATABASE & API
        // ==========================================
        const GOOGLE_SHEETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQnp6kkrTJnRs9gzJoEIrICv5p77-slw75C6ilwrDynFIOZmOgBGKUrKqfoaQF7n6tmiBwY8vzCczdb/pub?output=csv'; 
        
        // PASTE URL WEB APP DARI GOOGLE APPS SCRIPT DI BAWAH INI:
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJQxBQCFSwP5z6GqnS5rwne-va642iR4QEoUK8DCIY05iXTGQY97OCtt3zgr4enfJk/exec';

        let state = {
            query: '',
            activeTab: 'all',
            isLoading: false,
            results: { kauniyah: [], quran: [] },
            fullKauniyahDatabase: []
        };
        let searchTimeout = null;

        // ==========================================
        // 2. FUNGSI LOGIKA DATA (GLOBAL)
        // ==========================================
        function parseCSV(csvText) {
            const rows = csvText.split(/\r?\n/);
            const data = [];
            for(let i = 1; i < rows.length; i++) {
                if(!rows[i].trim()) continue;
                const cols = [];
                let curr = '';
                let inQuotes = false;
                for(let char of rows[i]) {
                    if(char === '"') inQuotes = !inQuotes;
                    else if(char === ',' && !inQuotes) { cols.push(curr); curr = ''; }
                    else { curr += char; }
                }
                cols.push(curr);
                
                if(cols.length >= 2 && (cols[1] || '').trim() !== '') {
                    data.push({
                        id: (cols[0] || '').replace(/(^"|"$)/g, '').trim() || 'id_'+i, 
                        word: (cols[1] || '').replace(/(^"|"$)/g, '').trim(),
                        maknaPositif: (cols[2] || '').replace(/(^"|"$)/g, '').trim(),
                        maknaNegatif: (cols[3] || '').replace(/(^"|"$)/g, '').trim(),
                        keterangan: (cols[4] || '').replace(/(^"|"$)/g, '').trim()
                    });
                }
            }
            return data;
        }

        async function initKauniyahDatabase() {
            try {
                const cacheBuster = '&t=' + new Date().getTime();
                const res = await fetch(GOOGLE_SHEETS_CSV_URL + cacheBuster);
                const text = await res.text();
                state.fullKauniyahDatabase = parseCSV(text);
            } catch (err) {
                console.error("Gagal load database", err);
            }
        }

        async function fetchQuranSearch(query) {
            try {
                const searchRes = await fetch(`https://api.quran.com/api/v4/search?q=${query}&size=3&language=id`);
                const searchData = await searchRes.json();
                const verses = searchData.search.results;
                if (!verses) return [];
                const quranResults = [];
                for (const verse of verses) {
                    const verseKey = verse.verse_key;
                    const [surahNum, ayatNum] = verseKey.split(':');
                    const textRes = await fetch(`https://api.quran.com/api/v4/verses/by_key/${verseKey}?translations=33&fields=text_uthmani`);
                    const textData = await textRes.json();
                    quranResults.push({
                        id: verseKey,
                        surah: `Surah Ke-${surahNum}`,
                        ayat: ayatNum,
                        arabic: textData.verse.text_uthmani,
                        translation: textData.verse.translations[0].text.replace(/<[^>]*>?/gm, '') 
                    });
                }
                return quranResults;
            } catch (err) { return []; }
        }

        async function executeSearch() {
            const query = state.query.toLowerCase().trim();
            if (!query) {
                state.results = { kauniyah: [], quran: [] };
                setLoading(false); render(); return;
            }
            setLoading(true);
            const filteredKauniyah = state.fullKauniyahDatabase.filter(item => 
                item.word.toLowerCase().includes(query) || 
                item.maknaPositif.toLowerCase().includes(query) ||
                item.keterangan.toLowerCase().includes(query)
            );
            const filteredQuran = await fetchQuranSearch(query);
            state.results = { kauniyah: filteredKauniyah, quran: filteredQuran };
            setLoading(false); render();
        }

        function setLoading(isLoading) {
            state.isLoading = isLoading;
            const searchIconContainer = document.getElementById('searchIconContainer');
            if (searchIconContainer) {
                searchIconContainer.innerHTML = isLoading ? `<div class="loader"></div>` : `<i data-lucide="search" class="w-6 h-6 text-yellow-500"></i>`;
                if(!isLoading) lucide.createIcons();
            }
        }

        function updateTabUI() {
            const tabButtons = document.querySelectorAll('.tab-btn');
            tabButtons.forEach(btn => {
                const tab = btn.getAttribute('data-tab');
                btn.className = (tab === state.activeTab) 
                    ? "tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all bg-neutral-900 text-yellow-400 shadow-sm flex items-center gap-2"
                    : "tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all text-slate-600 hover:bg-slate-100 flex items-center gap-2";
            });
        }

        function render() {
            const mainContent = document.getElementById('mainContent');
            if (!mainContent) return;

            if (state.isLoading) {
                mainContent.innerHTML = `<div class="text-center py-12"><div class="loader mx-auto mb-4"></div><p class="text-slate-400">Mencari makna...</p></div>`;
                return;
            }
            let html = '';
            const query = state.query.trim();
            
            if (!query) {
                html = `<div class="text-center py-12 text-slate-500"><p>Gunakan kotak pencarian untuk memulai eksplorasi.</p></div>`;
            } else if (state.results.kauniyah.length === 0 && state.results.quran.length === 0) {
                html = `<div class="text-center py-12 bg-white rounded-3xl border border-slate-100"><i data-lucide="info" class="w-12 h-12 mx-auto text-slate-200 mb-4"></i><p>Tidak ditemukan hasil.</p></div>`;
            } else {
                if ((state.activeTab === 'all' || state.activeTab === 'kauniyah') && state.results.kauniyah.length > 0) {
                    html += `<div class="mb-8"><h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><i data-lucide="sun" class="w-4 h-4"></i> Kauniyah (${state.results.kauniyah.length})</h2><div class="grid gap-4 md:grid-cols-2">`;
                    html += state.results.kauniyah.map(item => `
                        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm relative group">
                            <!-- Tombol Edit Tersembunyi -->
                            <button onclick="openAdminModal('update', '${item.id}')" class="absolute top-4 right-4 text-slate-300 hover:text-yellow-500 bg-slate-50 p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                            
                            <h3 class="text-xl font-bold text-slate-800 mb-3 border-b pb-2 pr-8">${item.word}</h3>
                            <div class="space-y-2">
                                ${item.maknaPositif ? `<div class="bg-emerald-50 p-3 rounded-2xl text-sm"><b class="text-emerald-700 block mb-1">Positif:</b> ${item.maknaPositif}</div>` : ''}
                                ${item.maknaNegatif ? `<div class="bg-rose-50 p-3 rounded-2xl text-sm"><b class="text-rose-700 block mb-1">Negatif:</b> ${item.maknaNegatif}</div>` : ''}
                                ${item.keterangan ? `<p class="text-xs text-slate-400 italic px-1 pt-1">${item.keterangan}</p>` : ''}
                            </div>
                        </div>`).join('');
                    html += `</div></div>`;
                }
                
                if ((state.activeTab === 'all' || state.activeTab === 'quran') && state.results.quran.length > 0) {
                    html += `<div><h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><i data-lucide="book" class="w-4 h-4"></i> Harfiyah (${state.results.quran.length})</h2><div class="space-y-4">`;
                    html += state.results.quran.map(item => `
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <div class="flex justify-between items-center mb-4"><span class="bg-yellow-100 text-yellow-700 text-[10px] font-bold px-3 py-1 rounded-full uppercase">${item.surah} : ${item.ayat}</span></div>
                            <p class="text-2xl font-arabic text-right mb-4 leading-loose dir-rtl">${item.arabic}</p>
                            <div class="bg-slate-50 p-4 rounded-2xl text-sm text-slate-600 leading-relaxed"><b class="text-slate-800 block mb-1">Terjemah:</b> ${item.translation}</div>
                        </div>`).join('');
                    html += `</div></div>`;
                }
            }
            mainContent.innerHTML = html;
            lucide.createIcons();
        }

        // ==========================================
        // 3. FUNGSI MODAL ADMIN (GLOBAL)
        // ==========================================
        function openAdminModal(action, id = null) {
            const modal = document.getElementById('adminModal');
            document.getElementById('formAction').value = action;
            document.getElementById('editId').value = id || '';
            
            if(action === 'update' && id) {
                const item = state.fullKauniyahDatabase.find(x => x.id === id);
                if(item) {
                    document.getElementById('modalTitle').innerHTML = `<i data-lucide="edit" class="text-yellow-500"></i> Edit Data`;
                    document.getElementById('newWord').value = item.word;
                    document.getElementById('newPositif').value = item.maknaPositif;
                    document.getElementById('newNegatif').value = item.maknaNegatif;
                    document.getElementById('newKet').value = item.keterangan;
                }
            } else {
                document.getElementById('modalTitle').innerHTML = `<i data-lucide="plus-circle" class="text-yellow-500"></i> Tambah Data`;
                document.getElementById('cmsForm').reset();
                document.getElementById('formAction').value = 'add';
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
            document.getElementById('adminPass').focus();
        }

        function closeAdminModal() {
            const modal = document.getElementById('adminModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('cmsForm').reset();
        }

        // ==========================================
        // 4. PENGIKATAN EVENT (Setelah HTML Selesai Dimuat)
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            // Render icon gembok & tombol di awal
            lucide.createIcons();

            // Event Listener Pencarian
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    state.query = e.target.value;
                    if (searchTimeout) clearTimeout(searchTimeout);
                    if(state.query.trim()) setLoading(true);
                    searchTimeout = setTimeout(() => { executeSearch(); }, 800); 
                });
            }

            // Event Listener Tombol Tab (Kauniyah/Harfiyah)
            const tabButtons = document.querySelectorAll('.tab-btn');
            tabButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    state.activeTab = e.currentTarget.getAttribute('data-tab');
                    updateTabUI(); render();
                });
            });

            // Event Listener Login Pengunjung
            const userLoginForm = document.getElementById('userLoginForm');
            if (userLoginForm) {
                userLoginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    if(APPS_SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbzJQxBQCFSwP5z6GqnS5rwne-va642iR4QEoUK8DCIY05iXTGQY97OCtt3zgr4enfJk/exec') {
                        alert("PENTING: Anda belum memasukkan URL Google Apps Script di dalam kode HTML.");
                        return;
                    }

                    const password = document.getElementById('userPass').value;
                    const btn = document.getElementById('userLoginBtn');
                    
                    btn.disabled = true;
                    btn.innerHTML = `<div class="loader" style="border-top-color: white; width:20px; height:20px;"></div>`;

                    try {
                        const response = await fetch(APPS_SCRIPT_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            redirect: 'follow',
                            body: JSON.stringify({ action: 'login', password: password })
                        });

                        const result = await response.json();

                        if(result.status === 'success') {
                            // Sembunyikan form login, tampilkan aplikasi utama
                            document.getElementById('loginOverlay').classList.add('hidden');
                            document.getElementById('loginOverlay').classList.remove('flex');
                            document.getElementById('appContainer').classList.remove('hidden');
                            
                            // Load data setelah berhasil login
                            initKauniyahDatabase().then(() => {
                                lucide.createIcons();
                                render();
                            });
                        } else {
                            alert(result.message);
                        }
                    } catch (error) {
                        console.error(error);
                        alert("Terjadi kesalahan jaringan. Cek kembali URL Apps Script Anda.");
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = `<i data-lucide="unlock" class="w-5 h-5"></i> Masuk`;
                        lucide.createIcons();
                    }
                });
            }

            // Event Listener Form CMS Admin
            const cmsForm = document.getElementById('cmsForm');
            if (cmsForm) {
                cmsForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    if(APPS_SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbzJQxBQCFSwP5z6GqnS5rwne-va642iR4QEoUK8DCIY05iXTGQY97OCtt3zgr4enfJk/exec') {
                        alert("PENTING: Anda belum memasukkan URL Google Apps Script.");
                        return;
                    }

                    const btn = document.getElementById('submitBtn');
                    const payload = {
                        password: document.getElementById('adminPass').value,
                        action: document.getElementById('formAction').value,
                        id: document.getElementById('editId').value,
                        word: document.getElementById('newWord').value,
                        positif: document.getElementById('newPositif').value,
                        negatif: document.getElementById('newNegatif').value,
                        keterangan: document.getElementById('newKet').value
                    };

                    btn.disabled = true;
                    btn.innerHTML = `<div class="loader"></div> Menyimpan...`;

                    try {
                        const response = await fetch(APPS_SCRIPT_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            redirect: 'follow', 
                            body: JSON.stringify(payload)
                        });

                        const result = await response.json();

                        if(result.status === 'success') {
                            alert(result.message);
                            closeAdminModal();
                            await initKauniyahDatabase(); 
                            executeSearch(); 
                        } else {
                            alert("Gagal: " + result.message); 
                        }
                        
                    } catch (error) {
                        console.error(error);
                        alert("Terjadi kesalahan. Pastikan URL Apps Script benar dan di-deploy 'Siapa Saja'.");
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = `<i data-lucide="send" class="w-4 h-4"></i> Simpan Data`;
                        lucide.createIcons();
                    }
                });
            }
        });
    </script>
</body>
</html>
